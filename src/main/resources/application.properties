# ==============================
# STABLE FILESYSTEM STORAGE
# ==============================
# Base storage directory (relative to backend/ working directory — auto-created at startup)
app.storage.path=storage

# ==============================
# FILE UPLOAD DIRECTORIES
# ==============================
file.upload.payments-dir=uploads/payments
file.upload.avatars-dir=uploads/avatars
# Drop zone for offline-generated Gaussian Splat files (.ksplat / .splat).
# After running: ns-export gaussian-splat → convert to .ksplat → place here,
# then upload via POST /api/models/property/{id}/upload so the backend stores
# it and serves it at /api/models/public/{modelId}.
file.upload.models-dir=uploads/models

# ==============================
# VIRTUAL TOUR GENERATION
# ==============================
# Path to FFmpeg / FFprobe executables (use full path if not in system PATH)
# Windows example: app.ffmpeg.path=C:/ffmpeg/bin/ffmpeg.exe
# Linux/Mac:       app.ffmpeg.path=ffmpeg
app.ffmpeg.path=C:/Users/MontassarGassara/AppData/Local/Microsoft/WinGet/Links/ffmpeg.exe
app.ffprobe.path=C:/Users/MontassarGassara/AppData/Local/Microsoft/WinGet/Links/ffprobe.exe

# Directory to store generated tour files — always inside app.storage.path
# IMPORTANT: must use storage/ prefix so files land inside backend/storage/, not Tomcat temp
app.virtual-tour.upload-dir=storage/virtual-tours

# Maximum number of scene frames to extract per tour
app.virtual-tour.max-scenes=20

# ==============================
# GAUSSIAN SPLATTING PIPELINE
# ==============================
# Working directory for Gaussian Splat jobs
app.gaussian.work-dir=storage/gaussian
# Absolute path to the gaussian-splatting project folder
app.gaussian.gs-path=C:/Users/MontassarGassara/Desktop/ProjectPFE/gaussian-splatting
# COLMAP executable — full path to COLMAP.bat on Windows
app.gaussian.colmap-executable=C:/gs/colmap-x64-windows-cuda/COLMAP.bat
# Python executable — prefer conda run (auto-detected), else direct python
app.gaussian.python-executable=python
# Name of the conda environment that has gaussian-splatting dependencies
# Real env path: C:\Users\MontassarGassara\anaconda3\envs\gs
app.gaussian.conda-env=gs
# Default training iterations (30 000 gives substantially better quality than 7 000)
app.gaussian.iterations=30000
# Target number of frames extracted from the video before COLMAP
app.gaussian.target-frames=200
# Laplacian-variance blur threshold — frames scoring below this are discarded (0 = disabled)
app.gaussian.blur-threshold=100

# ==============================
# MAP ANYTHING 3D RECONSTRUCTION
# ==============================
# Absolute path to the local map-anything repository clone
app.mapanything.repo-path=C:/Users/MontassarGassara/map-anything
# Conda environment that has MapAnything + PyTorch installed
app.mapanything.conda-env=mapanything
# Target frames to extract from the input video (fewer than GS → faster inference)
app.mapanything.target-frames=40
# Max image size fed to the model (reduces VRAM; set 0 to omit the flag)
app.mapanything.max-image-size=512
# Working directory for GLB reconstruction jobs
app.mapanything.work-dir=storage/mapanything
# Inference timeout in minutes — includes first-run checkpoint download (~4 GB Apache model)
app.mapanything.timeout-minutes=120

